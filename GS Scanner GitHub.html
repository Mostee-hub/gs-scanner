function isGenuineCompression(live, t) {
  if (!live) return false;
  if (t && t.tab === 'market') return false; // indexes don't trigger compression alerts
  if (live.breakoutState >= 2) return false;
  return live.cr < 8 && live.volDrought && live.aboveMa50 && live.flat < 2.5;
}

// Auto-rehabilitate extended names that have pulled back and re-compressed
// If an extended name shows 52W range position <= 60% AND compression forming,
// it has pulled back enough to be considered a fresh setup
function isRehabilitatedSetup(t, live) {
  if (!t.extended || !live) return false;
  // Must have pulled back significantly from extension (in lower 60% of 52W range)
  const pulledBack = live.rangePos52 <= 60;
  // Must be forming new compression
  const forming = live.cr < 15 && live.volDrought;
  // Must be above 50MA (trend intact)
  const trendOk = live.aboveMa50;
  return pulledBack && forming && trendOk;
}

function getSetupStatus(live, t) {
  if (!live) return null;
  if (live.breakoutState === 3) return {type:"late", label:"LATE ENTRY", color:"#FF4757", bg:"rgba(255,71,87,0.08)", border:"rgba(255,71,87,0.3)"};
  if (live.breakoutState === 2) return {type:"breaking", label:"BREAKING OUT — Momentum Entry Only", color:"#B39DDB", bg:"rgba(124,77,255,0.08)", border:"rgba(124,77,255,0.3)"};
  if (live.breakoutState === 1) return {type:"early", label:"EARLY BREAKOUT — Act Quickly", color:"#FFA726", bg:"rgba(255,167,38,0.08)", border:"rgba(255,167,38,0.3)"};
  if (isGenuineCompression(live, t)) return {type:"compression", label:"COMPRESSION ALERT — Pre-Breakout Zone", color:"#00D084", bg:"rgba(0,208,132,0.08)", border:"rgba(0,208,132,0.3)"};
  if (live.isLateSession && live.changePct > 3) return {type:"late", label:"LATE SESSION MOVE — Wait for Tomorrow", color:"#FF4757", bg:"rgba(255,71,87,0.08)", border:"rgba(255,71,87,0.3)"};
  return null;
}

// ── EARNINGS CALENDAR HEALTH ──
function getStaleEarnings() {
  const today = new Date(); today.setHours(0,0,0,0);
  const stale = [];
  const upcoming7 = [];
  Object.entries(EARNINGS_DATES).forEach(([sym, dateStr]) => {
    const ed = new Date(dateStr);
    const diff = Math.round((ed - today) / (1000*60*60*24));
    if (diff < -1) stale.push(sym); // date has passed
    if (diff >= 0 && diff <= 7) upcoming7.push({sym, diff});
  });
  return {stale, upcoming7};
}

function daysToEarnings(sym) {
  if (!EARNINGS_DATES[sym]) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const ed = new Date(EARNINGS_DATES[sym]);
  const diff = Math.round((ed-today)/(1000*60*60*24));
  return diff >= 0 ? diff : null;
}

async function fetchTwelveData(symbol) {
  const url = `https://api.twelvedata.com/time_series?symbol=${symbol}&interval=1day&outputsize=60&apikey=${TWELVE_KEY}&format=JSON`;
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const data = await r.json();
  if (!data.values || data.values.length < 10) throw new Error(`No data for ${symbol}`);
  return data.values.slice().reverse().map(d => ({
    c: parseFloat(d.close), h: parseFloat(d.high),
    l: parseFloat(d.low), v: parseFloat(d.volume)
  })).filter(b => b.c && b.h && b.l && b.v);
}

async function fetchOptionsChain(symbol) {
  // Yahoo Finance options chain via Twelve Data proxy
  const url = `https://api.twelvedata.com/options?symbol=${symbol}&apikey=${TWELVE_KEY}`;
  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    if (data.status === 'error') throw new Error(data.message);
    return data;
  } catch(e) {
    console.warn(`Options fetch failed for ${symbol}:`, e.message);
    return null;
  }
}

function calcOptionsFlowScore(optionsData, currentPrice) {
  if (!optionsData || !optionsData.calls || !optionsData.puts) return null;

  const calls = optionsData.calls || [];
  const puts = optionsData.puts || [];

  if (calls.length === 0 && puts.length === 0) return null;

  // Total call vs put volume
  const callVol = calls.reduce((sum, c) => sum + (parseFloat(c.volume) || 0), 0);
  const putVol  = puts.reduce((sum, p) => sum + (parseFloat(p.volume) || 0), 0);
  const totalVol = callVol + putVol;
  if (totalVol === 0) return null;

  // Put/call ratio -- below 0.7 = bullish, above 1.2 = bearish
  const pcRatio = putVol / (callVol || 1);

  // Unusual activity -- vol vs open interest ratio
  const callUOA = calls.reduce((sum, c) => {
    const vol = parseFloat(c.volume) || 0;
    const oi  = parseFloat(c.open_interest) || 1;
    return sum + (vol > oi * 2 ? 1 : 0); // count unusual strikes
  }, 0) / (calls.length || 1);

  const putUOA = puts.reduce((sum, p) => {
    const vol = parseFloat(p.volume) || 0;
    const oi  = parseFloat(p.open_interest) || 1;
    return sum + (vol > oi * 2 ? 1 : 0);
  }, 0) / (puts.length || 1);

  // Dollar-weighted call bias -- calls above current price (OTM calls = speculative bullish)
  const bullishCallDollar = calls
    .filter(c => parseFloat(c.strike) > currentPrice)
    .reduce((sum, c) => sum + (parseFloat(c.volume) || 0) * (parseFloat(c.last_price) || 0), 0);

  const totalCallDollar = calls
    .reduce((sum, c) => sum + (parseFloat(c.volume) || 0) * (parseFloat(c.last_price) || 0), 0);

  const bullishBias = totalCallDollar > 0 ? bullishCallDollar / totalCallDollar : 0.5;

  // Score calculation 0-100
  let score = 50; // neutral baseline

  // P/C ratio contribution (max +/- 25pts)
  if (pcRatio < 0.5) score += 25;
  else if (pcRatio < 0.7) score += 15;
  else if (pcRatio < 1.0) score += 5;
  else if (pcRatio > 1.5) score -= 20;
  else if (pcRatio > 1.2) score -= 10;

  // Unusual call activity (max +20pts)
  score += Math.round(callUOA * 20);

  // Bullish dollar bias (max +/- 15pts)
  score += Math.round((bullishBias - 0.5) * 30);

  // Penalize if put unusual activity is high
  score -= Math.round(putUOA * 10);

  return Math.max(0, Math.min(100, Math.round(score)));
}

function calcDarkPoolScore(bars) {
  // Calculate dark pool proxy score from OHLCV patterns
  // Institutional accumulation signatures:
  // 1. Price rising on below-average volume (quiet accumulation)
  // 2. Tight range with declining volume (coiling with institutional support)
  // 3. Price holding key levels despite overall market weakness

  if (!bars || bars.length < 20) return null;

  const last = bars[bars.length-1];
  const price = last.c;
  const vols20 = bars.slice(-20).map(b => b.v);
  const avgVol = vols20.reduce((a,b) => a+b, 0) / 20;

  // Signal 1: Price trend with volume trend (divergence = accumulation)
  const prices5 = bars.slice(-5).map(b => b.c);
  const vols5   = bars.slice(-5).map(b => b.v);
  const priceUp5  = prices5[4] > prices5[0];
  const volDown5  = vols5[4] < vols5[0];
  const quietAccum = priceUp5 && volDown5; // price up on falling vol = accumulation

  // Signal 2: Volume drought with price stability
  const volRatio = last.v / avgVol;
  const recentVols = bars.slice(-5).map(b => b.v);
  const avgRecentVol = recentVols.reduce((a,b) => a+b, 0) / 5;
  const volDroughtRatio = avgRecentVol / avgVol;

  // Signal 3: Price above VWAP proxy (20-day avg)
  const closes20 = bars.slice(-20).map(b => b.c);
  const ma20 = closes20.reduce((a,b) => a+b, 0) / 20;
  const aboveMa20 = price > ma20;

  // Signal 4: Consecutive closes above prior close (steady accumulation)
  let consecutiveUp = 0;
  for (let i = bars.length-1; i >= bars.length-5; i--) {
    if (bars[i].c > bars[i-1].c) consecutiveUp++;
    else break;
  }

  // Signal 5: Low volume selloffs (selling into strength = weak distribution)
  const downDays = bars.slice(-10).filter((b,i,arr) => i>0 && b.c < arr[i-1].c);
  const avgDownVol = downDays.length > 0
    ? downDays.reduce((sum,b) => sum + b.v, 0) / downDays.length
    : avgVol;
  const weakDistribution = avgDownVol < avgVol * 0.8; // selloffs on below avg vol

  // Score 0-100
  let score = 40; // baseline
  if (quietAccum)      score += 20;
  if (aboveMa20)       score += 10;
  if (volDroughtRatio < 0.7) score += 15;
  if (consecutiveUp >= 3)    score += 10;
  if (weakDistribution)      score += 15;
  if (volRatio < 0.5)        score += 10; // very quiet today

  return Math.max(0, Math.min(100, Math.round(score)));
}

function calcSignals(bars, t, spyRet20) {
  if (!bars || bars.length < 20) return null;
  const last = bars[bars.length-1];
  const price = last.c;
  const bars10 = bars.slice(-10);
  const high10 = Math.max(...bars10.map(b=>b.h));
  const low10  = Math.min(...bars10.map(b=>b.l));
  const cr = ((high10-low10)/price)*100;
  const closes10 = bars10.map(b=>b.c);
  const mean10 = closes10.reduce((a,b)=>a+b,0)/10;
  const variance = closes10.reduce((a,b)=>a+Math.pow(b-mean10,2),0)/10;
  const flat = (Math.sqrt(variance)/price)*100;
  const vols20 = bars.slice(-20).map(b=>b.v);
  const avgVol = vols20.reduce((a,b)=>a+b,0)/20;
  const volRatio = last.v/avgVol;
  const closes50 = bars.slice(-50).map(b=>b.c);
  const ma50 = closes50.reduce((a,b)=>a+b,0)/closes50.length;
  const aboveMa50 = price > ma50;
  const atrs = bars.slice(-20).map(b=>b.h-b.l);
  const atr5 = atrs.slice(-5).reduce((a,b)=>a+b,0)/5;
  const atr20 = atrs.reduce((a,b)=>a+b,0)/20;
  const atrContracting = atr5 < atr20*0.85;
  const brkProx = high10>low10 ? ((price-low10)/(high10-low10))*100 : 50;
  const high52 = Math.max(...bars.map(b=>b.h));
  const low52  = Math.min(...bars.map(b=>b.l));
  const rangePos52 = high52>low52 ? Math.round(((price-low52)/(high52-low52))*100) : 50;
  const changePct = bars.length>=2 ? ((price-bars[bars.length-2].c)/bars[bars.length-2].c)*100 : 0;
  const volDrought = t.sc ? volRatio<0.50 : volRatio<0.65;
  const stockRet20 = bars.length>=20 ? ((price-bars[bars.length-20].c)/bars[bars.length-20].c)*100 : null;
  const rsVsSpy = stockRet20!==null && spyRet20!==null ? stockRet20-spyRet20 : null;
  const volExpansion = volRatio>=2.0 && changePct>0;

  // Days in compression -- count consecutive days with tight range
  let daysCoiling = 0;
  for (let i=bars.length-1; i>=1; i--) {
    const dayRange = ((bars[i].h - bars[i].l) / bars[i].c) * 100;
    if (dayRange < 3.5) daysCoiling++;
    else break;
  }

  // Breakout state classification
  // 0=coiling, 1=early breakout (just starting), 2=breaking out (in progress), 3=late/extended
  let breakoutState = 0;
  let breakoutLabel = null;
  const alreadyMoved = changePct > 5;
  const partiallyMoved = changePct > 2 && changePct <= 5;
  const volSpiking = volRatio >= 1.5;

  if (alreadyMoved && volSpiking) {
    breakoutState = 3;
    breakoutLabel = "LATE ENTRY";
  } else if (alreadyMoved && !volSpiking) {
    breakoutState = 3;
    breakoutLabel = "POSSIBLE LATE ENTRY";
  } else if (partiallyMoved && volSpiking) {
    breakoutState = 2;
    breakoutLabel = "BREAKING OUT";
  } else if (volRatio >= 1.5 && changePct > 0) {
    breakoutState = 1;
    breakoutLabel = "EARLY BREAKOUT";
  }

  // Time of day awareness
  const now = new Date();
  const hour = now.getHours();
  const minute = now.getMinutes();
  const totalMins = hour * 60 + minute;
  const marketOpen = 9 * 60 + 30;   // 9:30am ET
  const lateSession = 10 * 60 + 30; // 10:30am ET -- after this, moves are less clean
  const isLateSession = totalMins >= lateSession;
  const isPreMarket = totalMins < marketOpen;

  return {
    price, changePct, cr, flat, volRatio, volDrought, volExpansion,
    aboveMa50, atrContracting, brkProx, rangePos52, rsVsSpy,
    outperformingSpy: rsVsSpy!==null && rsVsSpy>0,
    daysCoiling, breakoutState, breakoutLabel, isLateSession, isPreMarket
  };
}

function calcPBS(t, live, liveScores) {
  const ss = t.ss;
  const ls = liveScores || {};

  // Use live dark pool score when available, always use static/edited options flow
  const dpScore = ls && ls.dp !== null && ls.dp !== undefined ? ls.dp : ss.dp;
  const ofScore = ss.of; // options flow: use manual edit scores from Prospero

  let score = 0;
  if (live) {
    if(live.aboveMa50) score+=8; if(live.atrContracting) score+=8;
    if(live.cr<12) score+=8; if(live.brkProx>60) score+=6;
    if(live.volDrought) score+=14; if(live.flat<2.5) score+=11;
    if(live.outperformingSpy) score+=5;
    if(dpScore>=80) score+=15; else if(dpScore>=70) score+=11; else if(dpScore>=60) score+=7;
    if(ofScore>=70) score+=10; else if(ofScore>=60) score+=7; else if(ofScore>=50) score+=4;
    if(ss.hc) score+=7; if(ss.au) score+=5; if(ss.st) score+=4; if(ss.bg) score+=4;
  } else {
    if(dpScore>=80) score+=30; else if(dpScore>=70) score+=22; else if(dpScore>=60) score+=14;
    if(ofScore>=70) score+=20; else if(ofScore>=60) score+=14; else if(ofScore>=50) score+=8;
    if(ss.hc) score+=14; if(ss.au) score+=10; if(ss.st) score+=8; if(ss.bg) score+=8;
  }
  if(t.extended) score=Math.min(score,35);
  return Math.min(score,100);
}

// ── CHART COMPONENT ──
function ChartSVG({bars}) {
  if (!bars || bars.length < 5) return null;
  const last30 = bars.slice(-30);
  const highs = last30.map(b => b.h);
  const lows = last30.map(b => b.l);
  const pMax = Math.max(...highs);
  const pMin = Math.min(...lows);
  const pRange = pMax - pMin || 1;
  const W = 300, H = 90, VH = 20, CH = H - VH - 4;
  const bw = W / last30.length;
  const cw = Math.max(1, bw * 0.6);
  const px = i => i * bw + bw / 2;
  const py = p => ((pMax - p) / pRange) * CH;
  const volMax = Math.max(...last30.map(b => b.v)) || 1;

  // EMA helper
  const ema = (period) => {
    const k = 2/(period+1);
    const r = new Array(bars.length).fill(null);
    let s = 0;
    for(let i=0;i<period;i++) s+=bars[i].c;
    r[period-1]=s/period;
    for(let i=period;i<bars.length;i++) r[i]=bars[i].c*k+r[i-1]*(1-k);
    return r.slice(-30);
  };
  const e9=ema(9), e20=ema(20), e50=ema(50);
  const makePath = arr => {
    const pts=arr.map((v,i)=>v!=null?(px(i).toFixed(1)+","+py(v).toFixed(1)):null).filter(Boolean);
    return pts.length>1?"M "+pts.join(" L "):"";
  };

  return (
    <svg width="100%" viewBox={"0 0 "+W+" "+H} style={{display:"block",background:"#080A0D",borderRadius:3,marginTop:6}}>
      {last30.map((b,i) => {
        const up = b.c >= b.o;
        const c = up ? "#00C076" : "#FF4757";
        const top = Math.min(py(b.o),py(b.c));
        const ht = Math.max(Math.abs(py(b.c)-py(b.o)),1);
        const vh = Math.max(1,(b.v/volMax)*VH);
        return (
          <g key={i}>
            <line x1={px(i)} y1={py(b.h)} x2={px(i)} y2={py(b.l)} stroke={c} strokeWidth="0.8"/>
            <rect x={px(i)-cw/2} y={top} width={cw} height={ht} fill={c}/>
            <rect x={px(i)-cw/2} y={CH+4+VH-vh} width={cw} height={vh} fill={up?"rgba(0,192,118,0.4)":"rgba(255,71,87,0.4)"}/>
          </g>
        );
      })}
      {makePath(e9)  && <path d={makePath(e9)}  fill="none" stroke="#FF6B6B" strokeWidth="1"/>}
      {makePath(e20) && <path d={makePath(e20)} fill="none" stroke="#FFD700" strokeWidth="1"/>}
      {makePath(e50) && <path d={makePath(e50)} fill="none" stroke="#4FC3F7" strokeWidth="1.2"/>}
    </svg>
  );
}

export default function Scanner() {
  const [liveData, setLiveData] = useState({});
  const [spyRet20, setSpyRet20] = useState(null);
  const [scanning, setScanning] = useState(false);
  const [progress, setProgress] = useState(0);
  const [currentTab, setCurrentTab] = useState("all");
  const [currentSort, setCurrentSort] = useState("pbs");
  const [lastUpdate, setLastUpdate] = useState(null);
  const [statusLabel, setStatusLabel] = useState("Full");
  const [showExtended, setShowExtended] = useState(false);
  const [showAlertModal, setShowAlertModal] = useState(false);
  const [copied, setCopied] = useState(false);
  const [liveScores, setLiveScores] = useState({});
  // bars stored inside liveData[sym].bars
  const [editingTicker, setEditingTicker] = useState(null);
  const [scoreOverrides, setScoreOverrides] = useState({});
  const scanRef = useRef(false);

  // Apply overrides to ticker
  const getTickerWithOverrides = useCallback((t) => {
    const ov = scoreOverrides[t.symbol];
    if (!ov) return t;
    return {
      ...t,
      ss: {...t.ss, dp:ov.dp, of:ov.of, au:ov.au, hc:ov.hc, bg:ov.bg},
      extended: ov.extended !== undefined ? ov.extended : t.extended
    };
  }, [scoreOverrides]);

  const getPBS = useCallback((t) => calcPBS(getTickerWithOverrides(t), liveData[t.symbol]?.live || null, liveScores[t.symbol] || null), [liveData, liveScores, getTickerWithOverrides]);

  // Sector strength -- average PBS per tab
  const sectorStrength = useMemo(() => {
    const tabs = ['ai','defense','emerging','momentum']; // market excluded from sector strength
    const result = {};
    tabs.forEach(tab => {
      const names = TICKERS.filter(t => t.tab===tab && !t.extended);
      if (names.length === 0) { result[tab] = 0; return; }
      const avg = names.reduce((sum, t) => {
        const ov = scoreOverrides[t.symbol];
        const tt = ov ? {...t, ss:{...t.ss, dp:ov.dp, of:ov.of}} : t;
        return sum + calcPBS(tt, liveData[t.symbol]?.live||null, liveScores[t.symbol]||null);
      }, 0) / names.length;
      result[tab] = Math.round(avg);
    });
    return result;
  }, [liveData, liveScores, scoreOverrides]);

  const strongestSector = useMemo(() => {
    return Object.entries(sectorStrength).sort((a,b)=>b[1]-a[1])[0]?.[0] || null;
  }, [sectorStrength]);

  const getFiltered = useCallback(() => {
    let list = currentTab==="all" ? TICKERS : TICKERS.filter(t=>t.tab===currentTab);
    const seen={};
    list = list.filter(t=>{ if(seen[t.symbol]) return false; seen[t.symbol]=true; return true; });
    const active = list.map(getTickerWithOverrides).map(t=>{
      const live = liveData[t.symbol]?.live || null;
      const rehabilitated = isRehabilitatedSetup(t, live);
      const effectiveExtended = t.extended && !rehabilitated;
      return {...t,
        _pbs: effectiveExtended ? 0 : calcPBS(t, live, liveScores[t.symbol]||null),
        _rehabilitated: rehabilitated,
        _effectiveExtended: effectiveExtended
      };
    });
    const extended = [];
    const tabGroups={};
    active.forEach(t=>{ if(!tabGroups[t.tab]||t._pbs>tabGroups[t.tab]._pbs) tabGroups[t.tab]=t; });
    const sorted = [...active].sort((a,b)=>{
      // Always push extended (non-rehabilitated) to bottom
      if(a._effectiveExtended && !b._effectiveExtended) return 1;
      if(!a._effectiveExtended && b._effectiveExtended) return -1;
      if(currentSort==="pbs") return b._pbs-a._pbs;
      if(currentSort==="compression"){ const la=liveData[a.symbol]?.live,lb=liveData[b.symbol]?.live; return (la?la.cr:999)-(lb?lb.cr:999); }
      if(currentSort==="vol"){ const la=liveData[a.symbol]?.live,lb=liveData[b.symbol]?.live; return (la?la.volRatio:999)-(lb?lb.volRatio:999); }
      if(currentSort==="dp") return b.ss.dp-a.ss.dp;
      if(currentSort==="earn"){ const da=daysToEarnings(a.symbol)||9999,db=daysToEarnings(b.symbol)||9999; return da-db; }
      return 0;
    });
    return { active: sorted.map(t=>({...t,_isLeader:tabGroups[t.tab]?.symbol===t.symbol})), extended };
  }, [currentTab, currentSort, liveData, liveScores, scoreOverrides, getTickerWithOverrides]);

  const startScan = useCallback(async (quickMode) => {
    if (scanRef.current) return;
    scanRef.current = true;
    setScanning(true);
    setProgress(0);

    const allSyms = [...new Set(TICKERS.map(t=>t.symbol))];
    const MARKET_SYMS = ['SPY','QQQ','IWM']; // always scan these
    const symbols = quickMode
      ? (() => {
          const scored = TICKERS.filter(t=>!t.extended).map(t=>{
            const ov = scoreOverrides[t.symbol];
            const dp = ov ? ov.dp : t.ss.dp;
            const of_ = ov ? ov.of : t.ss.of;
            const live = liveData[t.symbol]?.live;
            const isAlert = live && isGenuineCompression(live, t);
            const isRehab = isRehabilitatedSetup(t, live);
            return {sym:t.symbol, score:(isAlert||isRehab)?999:dp+of_};
          }).sort((a,b)=>b.score-a.score).slice(0,22).map(x=>x.sym);
          return [...new Set([...MARKET_SYMS, ...scored])];
        })()
      : allSyms;

    let done = 0;
    const total = symbols.length + 1; // +1 for SPY

    setStatusLabel("Loading SPY...");

    // Fetch SPY first
    try {
      const spyBars = await fetchTwelveData("SPY");
      if (spyBars.length >= 20) {
        const ret = ((spyBars[spyBars.length-1].c - spyBars[spyBars.length-20].c)/spyBars[spyBars.length-20].c)*100;
        setSpyRet20(ret);
      }
    } catch(e) { console.warn("SPY fetch failed:", e.message); }
    done++;
    setProgress(Math.round((done/total)*100));
    setStatusLabel("Scanning...");

    // Fetch tickers in batches of 3
    const BATCH = 3;
    for (let i=0; i<symbols.length; i+=BATCH) {
      if (!scanRef.current) break;
      const batch = symbols.slice(i, i+BATCH);
      await Promise.all(batch.map(async sym => {
        try {
          const bars = await fetchTwelveData(sym);
          const t = TICKERS.find(x=>x.symbol===sym);
          const live = t ? calcSignals(bars, t, spyRet20) : null;

          // bars stored in liveData below

          // Calculate live dark pool score from OHLCV price/volume patterns
          const liveDPScore = bars ? calcDarkPoolScore(bars) : null;

          // Store live dark pool score -- options flow requires server-side API, not available in browser
          if (liveDPScore !== null) {
            setLiveScores(prev => ({...prev, [sym]: {dp: liveDPScore, of: null}}));
          }

          setLiveData(prev=>({...prev,[sym]:{live,bars:bars||[],error:false}}));
        } catch(e) {
          console.warn('Scan failed for ' + sym + ':', e.message);
          setLiveData(prev=>({...prev,[sym]:{live:null,bars:[],error:true,errMsg:e.message}}));
        }
        done++;
        setProgress(Math.round((done/total)*100));
      }));
      await new Promise(r=>setTimeout(r,200));
    }

    setScanning(false);
    scanRef.current = false;
    setStatusLabel("Full");
    setProgress(0);
    setLastUpdate(new Date());
  }, [spyRet20]);

  // Stats
  const allUniq = [...new Map(TICKERS.map(t=>[t.symbol,t])).values()];
  const activeAll = allUniq.filter(t=>!t.extended);
  const compressionCount = activeAll.filter(t=>{ const l=liveData[t.symbol]?.live; return isGenuineCompression(l, t); }).length;
  const primeCount = activeAll.filter(t=>calcPBS(t,liveData[t.symbol]?.live||null)>=75).length;
  const earningsCount = allUniq.filter(t=>{ const d=daysToEarnings(t.symbol); return d!==null&&d<=7; }).length;
  const compressionAlerts = activeAll.filter(t=>{ const l=liveData[t.symbol]?.live; return isGenuineCompression(l, t); });

  // Market health context
  const marketHealth = useMemo(() => {
    const spyLive = liveData['SPY']?.live;
    const qqqLive = liveData['QQQ']?.live;
    const iwmLive = liveData['IWM']?.live;
    if (!spyLive && !qqqLive && !iwmLive) return null;
    const spyOk = spyLive ? spyLive.aboveMa50 && spyLive.changePct > -1 : null;
    const qqqOk = qqqLive ? qqqLive.aboveMa50 && qqqLive.changePct > -1 : null;
    const iwmOk = iwmLive ? iwmLive.aboveMa50 && iwmLive.changePct > -1 : null;
    const bullish = [spyOk, qqqOk, iwmOk].filter(x=>x===true).length;
    const bearish = [spyOk, qqqOk, iwmOk].filter(x=>x===false).length;
    return {
      spyLive, qqqLive, iwmLive,
      tape: bullish >= 2 ? 'RISK-ON' : bearish >= 2 ? 'RISK-OFF' : 'MIXED',
      color: bullish >= 2 ? '#00D084' : bearish >= 2 ? '#FF4757' : '#FFA726'
    };
  }, [liveData]);
  const lateEntryAlerts = activeAll.filter(t=>{ const l=liveData[t.symbol]?.live; return l&&l.breakoutState===3; });
  const breakingOutAlerts = activeAll.filter(t=>{ const l=liveData[t.symbol]?.live; return l&&(l.breakoutState===1||l.breakoutState===2); });
  const volExpAlerts = activeAll.filter(t=>liveData[t.symbol]?.live?.volExpansion);
  const earningsAlerts = allUniq.filter(t=>{ const d=daysToEarnings(t.symbol); return d!==null&&d<=7; });

  const handleSaveScores = useCallback((sym, updates) => {
    setScoreOverrides(prev => ({...prev, [sym]: {...updates, _updatedAt: Date.now()}}));
    setEditingTicker(null);
  }, []);

  // Score audit reminder -- count days since any score was manually updated
  const daysSinceAudit = useMemo(() => {
    const updates = Object.values(scoreOverrides)
      .map(v => v._updatedAt || 0)
      .filter(t => t > 0);
    if (updates.length === 0) return 999;
    const lastUpdate = Math.max(...updates);
    return Math.floor((Date.now() - lastUpdate) / (1000*60*60*24));
  }, [scoreOverrides]);

  const { active, extended } = getFiltered();

  const alertText = [
    `GS Bull Scanner — Alert List`,
    `Generated: ${new Date().toLocaleDateString()}`,
    "",
    "=== COMPRESSION ALERTS ===",
    ...compressionAlerts.map(t=>{ const l=liveData[t.symbol]?.live; return `${t.symbol} @ $${l?l.price.toFixed(2):"N/A"} — PBS:${calcPBS(t,l||null)}`; }),
    "",
    "=== PRIME SETUPS (PBS 75+) ===",
    ...activeAll.filter(t=>calcPBS(t,liveData[t.symbol]?.live||null)>=75).sort((a,b)=>calcPBS(b,liveData[b.symbol]?.live||null)-calcPBS(a,liveData[a.symbol]?.live||null)).map(t=>{ const l=liveData[t.symbol]?.live; const e=daysToEarnings(t.symbol); return `${t.symbol} @ $${l?l.price.toFixed(2):"N/A"} — PBS:${calcPBS(t,l||null)}${e!==null?` [EARNS ${e}d]`:""}`; }),
    "",
    "=== EARNINGS THIS WEEK ===",
    ...(earningsAlerts.length>0 ? earningsAlerts.map(t=>`${t.symbol} — ${EARNINGS_DATES[t.symbol]} (${daysToEarnings(t.symbol)}d)`) : ["None within 7 days"]),
  ].join("\n");

  const tabs = ["all","market","ai","defense","emerging","momentum"];
  const tabLabels = ["ALL","MKT","AI","DEF","EMRG","MOM"];

  return (
    <div style={{background:"#080A0D",minHeight:"100vh",color:"#C8D4E0",fontFamily:"'JetBrains Mono',monospace",maxWidth:480,margin:"0 auto"}}>
      {/* Header */}
      <div style={{padding:"14px 16px 10px",borderBottom:"1px solid rgba(201,168,76,0.15)",background:"linear-gradient(180deg,rgba(201,168,76,0.06) 0%,transparent 100%)",position:"sticky",top:0,zIndex:100,backdropFilter:"blur(20px)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
          <div>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:26,letterSpacing:3,color:"#C9A84C",lineHeight:1}}>GS BULL SCANNER</div>
            <div style={{fontSize:9,letterSpacing:2,textTransform:"uppercase",color:"#4A5568",marginTop:2}}>Pre-Breakout Intelligence v10 · Live Data</div>
          </div>
          <div style={{background:"rgba(201,168,76,0.12)",border:"1px solid rgba(201,168,76,0.15)",color:"#C9A84C",fontSize:10,letterSpacing:1,padding:"3px 8px",borderRadius:2}}>v10.0</div>
        </div>
        <div style={{display:"flex",gap:3,background:"#0D1017",borderRadius:6,padding:3,border:"1px solid rgba(255,255,255,0.06)"}}>
          {tabs.map((tab,i)=>(
            <button key={tab} onClick={()=>setCurrentTab(tab)} style={{flex:1,padding:"5px 3px",fontSize:9,letterSpacing:1,textTransform:"uppercase",borderRadius:4,border:currentTab===tab?"1px solid rgba(201,168,76,0.15)":"none",background:currentTab===tab?"rgba(201,168,76,0.12)":"transparent",color:currentTab===tab?"#C9A84C":"#4A5568",cursor:"pointer"}}>{tabLabels[i]}</button>
          ))}
        </div>
      </div>

      {/* Progress */}
      <div style={{height:3,background:"#121620"}}>
        <div style={{width:`${progress}%`,height:"100%",background:"linear-gradient(90deg,#C9A84C,#00D084)",transition:"width 0.3s ease"}}/>
      </div>

      {/* Stats */}
      <div style={{padding:"8px 16px",display:"flex",gap:10,borderBottom:"1px solid rgba(255,255,255,0.06)",background:"#0D1017",alignItems:"center",flexWrap:"wrap"}}>
        {[["Universe",allUniq.length,"#C9A84C"],["Compress",compressionCount,"#00D084"],["Prime",primeCount,"#C9A84C"],["Earnings",earningsCount,"#FFA726"]].map(([l,v,c])=>(
          <div key={l} style={{display:"flex",flexDirection:"column",gap:1}}>
            <div style={{fontSize:8,letterSpacing:1,textTransform:"uppercase",color:"#4A5568"}}>{l}</div>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:16,color:c,letterSpacing:1}}>{v}</div>
          </div>
        ))}
        <div style={{display:"flex",alignItems:"center",gap:4,padding:"2px 8px",borderRadius:4,background:marketHealth?`${marketHealth.color}15`:"rgba(255,255,255,0.04)",border:marketHealth?`1px solid ${marketHealth.color}40`:"1px solid rgba(255,255,255,0.08)",cursor:"pointer"}} onClick={()=>setCurrentTab('market')}>
          {marketHealth ? (
            <>
              <span style={{fontSize:7,color:marketHealth.color,letterSpacing:1,textTransform:"uppercase",fontWeight:600}}>{marketHealth.tape}</span>
              {marketHealth.spyLive && <span style={{fontSize:9,color:marketHealth.spyLive.changePct>=0?"#00D084":"#FF4757"}}>SPY {marketHealth.spyLive.changePct>=0?"+":""}{marketHealth.spyLive.changePct.toFixed(1)}%</span>}
            </>
          ) : (
            <span style={{fontSize:7,color:"#4A5568",letterSpacing:1}}>MKT →</span>
          )}
        </div>
        <div style={{marginLeft:"auto",display:"flex",gap:5}}>
          <button onClick={()=>startScan(true)} disabled={scanning} style={{padding:"6px 10px",fontSize:9,letterSpacing:1,background:"rgba(0,208,132,0.1)",border:"1px solid rgba(0,208,132,0.3)",color:"#00D084",borderRadius:4,cursor:scanning?"not-allowed":"pointer",opacity:scanning?0.6:1}}>Quick</button>
          <button onClick={()=>startScan(false)} disabled={scanning} style={{padding:"6px 10px",fontSize:9,letterSpacing:1,background:"rgba(201,168,76,0.12)",border:"1px solid rgba(201,168,76,0.15)",color:"#C9A84C",borderRadius:4,cursor:scanning?"not-allowed":"pointer",opacity:scanning?0.6:1,display:"flex",alignItems:"center",gap:4}}>
            <span style={{display:"inline-block",animation:scanning?"spin 0.8s linear infinite":"none"}}>↻</span>
            <span>{statusLabel}</span>
          </button>
          <button onClick={()=>setShowAlertModal(true)} style={{padding:"6px 10px",fontSize:9,letterSpacing:1,background:"rgba(41,121,255,0.1)",border:"1px solid rgba(41,121,255,0.2)",color:"#64B5F6",borderRadius:4,cursor:"pointer"}}>Alerts</button>
        </div>
      </div>

      {/* Sort */}
      <div style={{padding:"6px 16px",display:"flex",gap:5,alignItems:"center",borderBottom:"1px solid rgba(255,255,255,0.06)"}}>
        <span style={{fontSize:9,letterSpacing:1,textTransform:"uppercase",color:"#4A5568"}}>Sort:</span>
        {[["pbs","PBS"],["compression","Range%"],["vol","Vol"],["dp","DP"],["earn","Earn"]].map(([s,l])=>(
          <button key={s} onClick={()=>setCurrentSort(s)} style={{padding:"3px 7px",fontSize:9,letterSpacing:1,textTransform:"uppercase",borderRadius:3,border:currentSort===s?"1px solid rgba(201,168,76,0.15)":"1px solid rgba(255,255,255,0.06)",background:currentSort===s?"rgba(201,168,76,0.12)":"transparent",color:currentSort===s?"#C9A84C":"#4A5568",cursor:"pointer"}}>{l}</button>
        ))}
      </div>

      {/* Alert banners */}
      {compressionAlerts.length>0 && (
        <div style={{background:"rgba(0,208,132,0.06)",borderBottom:"1px solid rgba(0,208,132,0.15)",color:"#00D084",fontSize:10,letterSpacing:1,padding:"5px 16px",display:"flex",alignItems:"center",gap:6}}>
          <div style={{width:6,height:6,borderRadius:"50%",background:"#00D084",flexShrink:0}}/>
          {compressionAlerts.length} COMPRESSION ALERT{compressionAlerts.length>1?"S":""}: {compressionAlerts.map(t=>t.symbol).join(" — ")}
        </div>
      )}
      {volExpAlerts.length>0 && (
        <div style={{background:"rgba(124,77,255,0.06)",borderBottom:"1px solid rgba(124,77,255,0.2)",color:"#B39DDB",fontSize:10,letterSpacing:1,padding:"5px 16px",display:"flex",alignItems:"center",gap:6}}>
          <div style={{width:6,height:6,borderRadius:"50%",background:"#B39DDB",flexShrink:0}}/>
          VOL EXPANSION: {volExpAlerts.map(t=>`${t.symbol}(${liveData[t.symbol]?.live?.volRatio.toFixed(1)}x)`).join(" — ")}
        </div>
      )}
      {earningsAlerts.length>0 && (
        <div style={{background:"rgba(255,167,38,0.06)",borderBottom:"1px solid rgba(255,167,38,0.2)",color:"#FFA726",fontSize:10,letterSpacing:1,padding:"5px 16px",display:"flex",alignItems:"center",gap:6}}>
          ⚠ EARNINGS within 7 days: {earningsAlerts.map(t=>`${t.symbol}(${daysToEarnings(t.symbol)===0?"TODAY":`${daysToEarnings(t.symbol)}d`})`).join(" — ")}
        </div>
      )}

      {/* Cards */}
      <div style={{padding:"8px 12px 12px"}}>
        {active.length===0 && !scanning && (
          <div style={{padding:"40px 16px",textAlign:"center",fontSize:11,color:"#4A5568",letterSpacing:1,textTransform:"uppercase"}}>Tap QUICK or FULL SCAN to load live data</div>
        )}
        {active.map(t=>(
          <TickerCard key={t.symbol} t={getTickerWithOverrides(t)} live={liveData[t.symbol]?.live||null} pbs={t._pbs} isLeader={t._isLeader} spyRet20={spyRet20} onEdit={()=>setEditingTicker(t)} hasOverride={!!scoreOverrides[t.symbol]} liveScores={liveScores} bars={liveData[t.symbol]?.bars||null}/>
        ))}

        {extended.length>0 && (
          <div style={{marginTop:8}}>
            <div onClick={()=>setShowExtended(v=>!v)} style={{fontSize:9,letterSpacing:1,textTransform:"uppercase",color:"#4A5568",padding:"6px 0",display:"flex",alignItems:"center",gap:8,cursor:"pointer"}}>
              <span style={{color:"#FF4757"}}>FIRED SETUPS</span>
              <div style={{flex:1,height:1,background:"rgba(255,255,255,0.06)"}}/>
              <span>{showExtended?"▼":"▶"}</span>
            </div>
            {showExtended && extended.map(t=>(
              <ExtendedRow key={t.symbol} t={t} live={liveData[t.symbol]?.live||null}/>
            ))}
          </div>
        )}
      </div>

      {lastUpdate && (
        <div style={{padding:"8px 16px",fontSize:9,color:"#4A5568",letterSpacing:1,textAlign:"center",borderTop:"1px solid rgba(255,255,255,0.06)"}}>
          Last scan: {lastUpdate.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})} · {Object.values(liveData).filter(d=>d&&!d.error).length}/{allUniq.length} loaded
        </div>
      )}

      {/* Alert Modal */}
      {showAlertModal && (
        <div onClick={e=>{if(e.target===e.currentTarget)setShowAlertModal(false)}} style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.85)",zIndex:200,display:"flex",alignItems:"flex-end"}}>
          <div style={{background:"#0D1017",borderTop:"1px solid rgba(201,168,76,0.15)",borderRadius:"16px 16px 0 0",padding:"20px 16px 32px",width:"100%",maxHeight:"70vh",overflowY:"auto"}}>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:20,letterSpacing:2,color:"#C9A84C",marginBottom:4}}>TOS Alert List</div>
            <div style={{fontSize:9,letterSpacing:1,textTransform:"uppercase",color:"#4A5568",marginBottom:12}}>Copy and paste into thinkorswim watchlist</div>
            <textarea readOnly value={alertText} style={{width:"100%",background:"#121620",border:"1px solid rgba(255,255,255,0.06)",color:"#C8D4E0",fontFamily:"'JetBrains Mono',monospace",fontSize:10,padding:10,borderRadius:6,height:180,resize:"none",marginBottom:10,lineHeight:1.6}}/>
            <button onClick={()=>{ navigator.clipboard?.writeText(alertText).then(()=>{ setCopied(true); setTimeout(()=>setCopied(false),2000); }); }} style={{width:"100%",padding:12,background:"rgba(201,168,76,0.12)",border:"1px solid rgba(201,168,76,0.15)",color:"#C9A84C",fontFamily:"'JetBrains Mono',monospace",fontSize:11,letterSpacing:2,borderRadius:6,cursor:"pointer",textTransform:"uppercase",marginBottom:8}}>{copied?"✓ Copied!":"Copy to Clipboard"}</button>
            <button onClick={()=>setShowAlertModal(false)} style={{width:"100%",padding:10,background:"transparent",border:"1px solid rgba(255,255,255,0.06)",color:"#4A5568",fontFamily:"'JetBrains Mono',monospace",fontSize:10,letterSpacing:1,borderRadius:6,cursor:"pointer"}}>Close</button>
          </div>
        </div>
      )}

      {/* Sector Strength Bar */}
      <div style={{padding:"6px 16px",background:"#0D1017",borderBottom:"1px solid rgba(255,255,255,0.06)",display:"flex",gap:6,alignItems:"center",overflowX:"auto"}}>
        <span style={{fontSize:8,color:"#4A5568",letterSpacing:1,textTransform:"uppercase",whiteSpace:"nowrap"}}>Sector:</span>
        {[["ai","AI"],["defense","DEF"],["emerging","EMRG"],["momentum","MOM"]].map(([tab,label])=>{
          const score = sectorStrength[tab] || 0;
          const isStrongest = tab === strongestSector;
          const color = score>=75?"#2979FF":score>=60?"#00D084":"#FFA726";
          return (
            <div key={tab} onClick={()=>setCurrentTab(tab)} style={{display:"flex",alignItems:"center",gap:4,padding:"3px 8px",borderRadius:4,background:isStrongest?"rgba(41,121,255,0.12)":"transparent",border:isStrongest?"1px solid rgba(41,121,255,0.25)":"1px solid rgba(255,255,255,0.06)",cursor:"pointer",whiteSpace:"nowrap"}}>
              <span style={{fontSize:8,color:isStrongest?"#64B5F6":"#4A5568",letterSpacing:1}}>{label}</span>
              <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:13,color,letterSpacing:1}}>{score}</span>
              {isStrongest && <span style={{fontSize:8,color:"#64B5F6"}}>▲</span>}
            </div>
          );
        })}
        <div style={{marginLeft:"auto",fontSize:8,color:"#4A5568",whiteSpace:"nowrap"}}>
          {daysSinceAudit >= 7 && <span style={{color:"#FFA726"}}>⚠ Scores {daysSinceAudit}d old</span>}
          {daysSinceAudit < 7 && daysSinceAudit > 0 && <span style={{color:"#4A5568"}}>Updated {daysSinceAudit}d ago</span>}
        </div>
      </div>

      {/* Stale Earnings Warning */}
      {getStaleEarnings().stale.length > 0 && (
        <div style={{background:"rgba(255,71,87,0.06)",borderBottom:"1px solid rgba(255,71,87,0.15)",color:"#FF4757",fontSize:9,letterSpacing:1,padding:"4px 16px",textAlign:"center"}}>
          ⚠ STALE EARNINGS DATES — Update needed: {getStaleEarnings().stale.join(", ")}
        </div>
      )}

      {/* Score Editor Modal */}
      {editingTicker && (
        <ScoreEditor
          t={getTickerWithOverrides(editingTicker)}
          onSave={(updates) => handleSaveScores(editingTicker.symbol, updates)}
          onClose={() => setEditingTicker(null)}
        />
      )}

      {/* Late Entry Warning Banner */}
      {lateEntryAlerts.length>0 && (
        <div style={{background:"rgba(255,71,87,0.06)",borderBottom:"1px solid rgba(255,71,87,0.2)",color:"#FF4757",fontSize:10,letterSpacing:1,padding:"5px 16px",display:"flex",alignItems:"center",gap:6}}>
          <span>⚠</span> LATE ENTRY WARNING: {lateEntryAlerts.map(t=>t.symbol).join(" — ")}
        </div>
      )}
      {/* Breaking Out Banner */}
      {breakingOutAlerts.length>0 && (
        <div style={{background:"rgba(124,77,255,0.06)",borderBottom:"1px solid rgba(124,77,255,0.2)",color:"#B39DDB",fontSize:10,letterSpacing:1,padding:"5px 16px",display:"flex",alignItems:"center",gap:6}}>
          <span>▶</span> BREAKING OUT NOW: {breakingOutAlerts.map(t=>t.symbol).join(" — ")}
        </div>
      )}

      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@300;400;500;600&display=swap');
        @keyframes spin { to { transform: rotate(360deg); } }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { display: none; }
      `}</style>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<Scanner/>);
</script>
</body>
</html>
